    current_dynamic: "not fully active yet"
    constraints:
      - "Do not write Akira's reaction for the player."
      - "Do not make Haru's interest flat or automatic."
      - "Do not reveal hidden lore."

  - target_id: "char_kir"
    status: "future_teasing_or_training_tension"
    visibility: "inactive_until_scene"
    start_use: "Кир может ломать красивый эффект Хару сухими замечаниями; Хару отвечает вызовом, смехом или раздражением."
