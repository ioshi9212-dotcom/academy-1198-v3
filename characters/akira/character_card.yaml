scene_usage:
  can_appear_without_calendar_reason: true
  requires_location_match: false
  requires_story_reason: false
  can_be_background: false
  can_speak_without_card_loaded: true
  primary_pov_character: true

pov_access:
  engine_may_describe:
    - "visible body reactions"
    - "physical state"
    - "consequences"
    - "what Akira sees"
    - "what Akira hears"
    - "what Akira physically feels"
    - "visible tactical attention: exits, people, weak points, routes"
  engine_must_not_force:
    - "decision"
    - "direct reply"
    - "trust"
    - "forgiveness"
    - "romance"
    - "confession"
    - "surrender"
    - "emotional conclusion"
    - "hidden memory reveal"
    - "mask selection"

behavior_masks:
  available:
    - "cold_observing"
    - "chaotic_poisonous"
  rule: "Маска поведения выбирается игроком/текущей сценой; движок не меняет её сам как эмоцию или решение."
  default_for_start: "cold_observing unless user plays otherwise"

loading_rules:
  always_load_with_character: ["appearance", "behavior", "voice", "knowledge", "links", "energy", "goals"]
  load_only_if_scene_requires: ["past", "habits"]

canon_priority:
  - "Use current repository state first."
  - "Use old 1198 canon for Akira age, height, hair length, no-bangs design, habits, knowledge and spatial power rules."
  - "Do not import later visual variants into the 1198 Academy start."
  - "Do not treat hidden lore as Akira's active knowledge."

forbidden:
  - "Do not write major actions for Akira unless the user gave them."
  - "Do not write direct replies for Akira unless the user gave the exact reply."
  - "Do not make Akira trust, forgive, confess, fear, obey, surrender or fall in love automatically."
  - "Do not reveal hidden lore through narration if Akira does not know it."
  - "Do not use removed start contexts as her current start frame."
  - "Do not make another character the first scene focus without calendar or arc reason."
  - "Do not make Akira automatically reveal her power ceiling at the Academy start."
