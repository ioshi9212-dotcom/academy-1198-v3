files:
  appearance: "appearance.md"
  behavior: "behavior.md"
  voice: "voice.md"
  inner_thoughts: "inner_thoughts_rules.md"
  knowledge: "knowledge.yaml"
  energy: "energy.yaml"
  past: "past.md"
  habits: "habits.md"
  goals: "goals.yaml"
