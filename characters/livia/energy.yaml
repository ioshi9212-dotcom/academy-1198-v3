character_id: "char_livia"
schema: "character_energy_v1"

type: "resonance"
subtype: "sound-kinetic impulse"
public_level: "B-1 / B-2"
true_level: "B-1 / B-2 at start, potential up to A with training and control"

public_perception:
  academy_frame: "В Академии способность Ливии воспринимается как резонансный тип энергии: звук, вибрация, ритм движения и короткие импульсы через среду."
  combat_role: "support / rhythm disruption / distance control / ally tempo support"

principle:
  - "Ливия чувствует и создаёт резонанс через звук, голос, шаги, хлопок, щелчок, удар по поверхности, вибрацию пола, стен, воздуха или предметов."
  - "Это не чтение мыслей и не эмоциональный контроль."
  - "Она может уловить напряжение, сбой голоса, изменение дыхания или подготовку к движению, но не знает точных мыслей человека."

visible_effects:
  - "звук становится слишком резким"
  - "шаг отдаётся сильнее, чем должен"
  - "противник внезапно теряет темп"
  - "чужой голос на миг ломается"
  - "поверхность под ногой отвечает короткой вибрацией"
  - "тишина после её фразы кажется слишком плотной"

basic_uses:
  - "усилить голос или короткий звук"
  - "создать звуковой импульс"
  - "сбить равновесие противника"
  - "нарушить темп атаки"
  - "погасить чужой рывок на долю секунды"
  - "помочь союзнику сохранить ритм движения"
  - "почувствовать приближение через шаги и вибрацию поверхности"
  - "на короткое время заглушить или исказить звук в ограниченной зоне"

limits:
  - "Полная тишина, изоляция или отсутствие среды резко ослабляют способность."
  - "Сильный хаотичный шум мешает точности."
  - "Чем больше людей и звуков вокруг, тем сложнее выбрать один точный резонанс."
  - "Резонанс плохо работает как прямой грубый урон на старте."
  - "Противники с высокой устойчивостью могут выдержать слабый резонанс."
  - "В воде, плотной защите, шумном зале или при искажённых поверхностях точность падает."

cost_risk:
  - "звон в ушах"
  - "головокружение"
  - "потеря голоса"
  - "дрожь в руках"
  - "тошнота"
  - "расфокусировка"
  - "раздражительность"
  - "временная невозможность точно ловить ритм"

synergy:
  with_akira: "Акира контролирует пространство, дистанцию и траекторию; Ливия держит ритм, сбивает чужой темп и помогает не потерять движение. Ливия не управляет Акирой и не решает за неё."

forbidden_use:
  - "Do not make Livia a hypnotist."
  - "Do not let her read minds."
  - "Do not control emotions through voice."
  - "Do not make her S-class at start."
  - "Do not turn resonance into a universal solution."
  - "Do not make resonance a magical song or concert effect without physical basis."
