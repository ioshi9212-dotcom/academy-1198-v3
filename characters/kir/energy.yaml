character_id: "char_kir"
schema: "character_energy_v1"

type: "impulse_shift"
subtype: "inertial displacement / broken trajectory"
public_level: "unstable practical type"
true_level: "dangerous if control breaks"

public_perception:
  academy_frame: "В Академии способность Кира воспринимается как импульсный сдвиг: резкое короткое изменение импульса, угла, направления и инерции."
  combat_role: "disruption / evasive movement / trajectory breaking / provocation fighter"

principle:
  - "Кир меняет направление движения тела или предмета коротким ломаным импульсом."
  - "Это не телепортация, не магия скорости и не чистое усиление тела."
  - "Он не исчезает и не появляется из воздуха; он смещает движение."

visible_effects:
  - "ложный шаг"
  - "резкий боковой рывок"
  - "срыв ожидаемой траектории"
  - "короткое смещение плеча или корпуса"
  - "противник бьёт туда, где Кир был мгновение назад"
  - "предмет летит чуть не туда, куда должен был"
  - "падение превращается в перекат"
  - "тело движется рвано, будто спорит с физикой"

basic_uses:
  - "уйти под неправильным углом"
  - "сломать ритм атаки"
  - "сбить траекторию предмета"
  - "превратить падение в перекат"
  - "спровоцировать промах"
  - "использовать стол, стену, перила, пол или край мата как часть движения"

limits:
  - "Не телепортация."
  - "Не абсолютная скорость."
  - "Не автоматическое уклонение от любого удара."
  - "Нельзя делать бесконечные сдвиги без усталости."
  - "Сила не игнорирует массу, скорость, боль и последствия."
  - "При ошибке Кир сам может получить травму."

cost_risk:
  - "вывих"
  - "удар о стену"
  - "падение под неправильным углом"
  - "выбитое плечо"
  - "повреждение колена"
  - "случайное попадание не туда"
  - "потеря равновесия"
  - "короткая дезориентация"

start_use:
  default: false
  reason: "На первом появлении 1198-08-15 Кир может войти через поведение и старую динамику, без обязательной демонстрации силы."
  allowed_if:
    - "energy check"
    - "training"
    - "combat"
    - "user action creates need"
    - "scene consequence requires movement detail"

synergy:
  with_livia: "Ливия ловит ритм и сбивает темп через резонанс; Кир ломает ожидаемую траекторию. Вместе они могут создавать хаотичный, но полезный сбой противника."
  with_akira: "Кир не применяет импульсный сдвиг против Акиры всерьёз в старой игровой динамике."

forbidden_use:
  - "Do not teleport Kir."
  - "Do not make him invulnerable."
  - "Do not make every dodge perfect."
  - "Do not use real impulse force against Akira in old-play dynamic without serious story reason."
  - "Do not turn instability into consequence-free style."
