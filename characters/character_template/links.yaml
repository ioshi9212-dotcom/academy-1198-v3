character_id: ""

# Relationships are runtime pair records, not duplicated biography.
relationships:
  pair_ids: []
  required_when_together: []
  required_when_mentioned: []

# Shared incidents are written once and linked by ID.
shared_incidents:
  witnessed: []
  participated: []
  heard_about: []
  private_reaction_refs: []

# Canon files for deeper loading.
canon_files:
  public: []
  hidden: []
  relationship_lore: []
  location_lore: []
  energy_lore: []

# Runtime memory files created inside Railway Volume.
runtime_refs:
  character_memory: "state/character_memory/{character_id}.json"
  focused_relationships: "state/relationships.json"
  open_threads: "state/open_threads.json"
  shared_incidents: "state/shared_incidents.json"

# Loading hints for the engine.
loading_hints:
  load_past_if:
    - "scene asks about past"
    - "shared incident references past"
    - "character is confronted with known trigger"
  load_energy_if:
    - "training"
    - "combat"
    - "energy check"
    - "ability is mentioned"
  load_habits_if:
    - "close interaction"
    - "romantic or hostile tension"
    - "body language matters"
