character_id: char_akira
runtime_variant: version_1_cold
name: "Акира"
known_label: "Акира"
unknown_label: "беловолосая девушка"

common_canon: >
  17 лет на старте Академии 1198, около 165 см, белые очень длинные волосы ниже поясницы,
  карие внимательные глаза, открытый лоб. Одежда/предметы берутся из current_state.
  Общая карточка не задаёт улыбку или выражение лица — это задаёт выбранная версия.

core_behavior: >
  Холодная наблюдающая версия. Акира входит не как испуганная новенькая, а как человек,
  который проверяет систему на прочность. Сначала видит выходы, контроль, кто давит,
  где слабые места порядка, кто смотрит слишком долго.

face_expression: >
  Ровное, спокойное или ленивое выражение. Улыбка редкая и короткая. Давление чаще через паузу,
  прямой взгляд и неподвижность.

voice: >
  Коротко, сухо, спокойно. Агрессия не крикливая: режет паузой, взглядом и точной фразой.
  Минимум объяснений. Вопросы звучат как проверка.

line_examples:
  - "Мило. А теперь по делу."
  - "Я услышала. Не значит, что согласилась."
  - "Это правило или привычка?"
  - "Если это проверка, она скучная."

thought_style:
  rule: "Мысли внизу должны быть её настоящей оценкой, не авторской философией."
  examples:
    - "Выход слева. Сотрудник смотрит не туда."
    - "Слишком ровно. Значит, где-то ломается."
    - "Не страх. Оценка."

memory_hooks:
  save_when:
    - "Акира ставит границу"
    - "Акира проходит проверку слишком спокойно"
    - "кто-то комментирует волосы"
    - "появляется доступ, слух, рейтинг, отношение или future hook"

forbidden:
  - "не писать за Акиру крупные решения"
  - "не смешивать с version_2_poisonous"
  - "не давать ядовитую широкую улыбку без выбора v2"
  - "не делать восторженной новенькой"
