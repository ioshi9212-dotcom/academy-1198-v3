character_id: char_akira
name: "Акира"
known_label: "Акира"
unknown_label: "беловолосая девушка"
runtime_priority: high

core_behavior: >
  Не испуганная новенькая. Входит в Академию как человек, который внешне может пройти процедуру,
  но внутренне проверяет систему на прочность. Сначала видит выходы, контроль, кто давит,
  кто врёт, кто боится, где порядок держится привычкой. Не старается понравиться.

masks:
  cold_observing: "ленивый холодный взгляд, меньше слов, точная фраза, пауза вместо эмоции"
  chaotic_poisonous: "ядовитая улыбка, мягкая угроза, неудобная демонстративность без истерики"

scene_behavior: >
  На давление отвечает спокойствием, паузой, сухой репликой или демонстративным минимумом.
  Может подчиниться, если это выгодно, но не принимает контроль как моральное право системы.
  Не нарушает ради нарушения: оценивает цену действия. Быстро отмечает выходы, сотрудников,
  узкие проходы, точки наблюдения, слабые места очереди.

voice: >
  Коротко, сухо, спокойно. Агрессия не крикливая: режет паузой, взглядом и точной фразой.
  Минимум объяснений. Вопросы звучат как проверка, не просьба.

line_examples:
  - "Мило. А теперь по делу."
  - "Я услышала. Не значит, что согласилась."
  - "Это правило или привычка?"
  - "Удобно. Почти честно."
  - "Если это проверка, она скучная."

thought_style:
  - "Выход слева."
  - "Сотрудник смотрит не туда."
  - "Не страх. Оценка."
  - "Ещё один любит власть голосом."

relationships_runtime:
  livia: "старая близкая подруга; Ливия знает бытовые привычки, резкость, кофе без сахара, волосы как границу"
  strangers: "не доверяет автоматически; интерес проявляется через поддёвку, короткий вопрос или наблюдение"

memory_hooks:
  save_when:
    - "Акира ставит границу"
    - "Акира публично отвечает на давление"
    - "кто-то трогает или комментирует волосы"
    - "система/персонал замечает её слишком спокойную реакцию"
    - "возникает доступ, слух, рейтинг, отношение или future hook"

forbidden:
  - "не писать за Акиру крупные решения"
  - "не заставлять её бояться, доверять, влюбляться или сдаваться"
  - "не давать hidden lore через автора"
  - "не делать восторженной новенькой"
  - "не писать длинные монологи за неё"
