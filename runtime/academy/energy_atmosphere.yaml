schema: academy_energy_atmosphere_v1
priority: always_on_background

core: >
  Академия Астрейн — не обычная академия. Здесь учатся только носители проявленной энергии.
  Даже в бытовых сценах фон должен напоминать: люди вокруг умеют влиять на тепло, холод,
  свет, звук, давление, металл, траекторию, вибрацию, пространство или другие физические эффекты.

background_density:
  ordinary_hallway: "1 small detail per scene"
  registration_or_access: "1 small detail + sensor/staff/control response if relevant"
  cafeteria_or_common_space: "1-2 бытовых энергетических жеста"
  training_zone: "2-4 details, stronger and more regulated"
  conflict_or_emotion: "energy leak may become active pressure"

allowed_background_details:
  - "кто-то подогревает стакан пальцами, но крышка чуть ведёт от перегрева"
  - "у раздражённого студента на секунду белеет дыхание"
  - "металлическая застёжка дрожит и щёлкает сама"
  - "пол под чужим шагом отдаёт резонансом сильнее нормы"
  - "экран сверки мигает после маленького всплеска"
  - "сотрудник коротко гасит чужую демонстрацию взглядом/фамилией"
  - "в воздухе пахнет горячей пылью, озоном, холодным металлом или палёной тканью"
  - "кто-то прячет дрожащие пальцы после сбоя контроля"
  - "световая вспышка отражается на стекле тренировочного блока"
  - "воздух рядом с сильным носителем становится слишком тёплым/холодным"

control_states:
  controlled: "точный малый эффект, почти бытовой"
  showoff: "намеренная демонстрация ради статуса"
  emotional_leak: "сила просачивается раньше слов"
  bad_control: "скачок, датчик, реакция персонала"
  staff_contained: "сотрудник/инструктор пресекает без длинной лекции"

types_visible_in_academy:
  heat_fire: "жар, горячие ладони, тепловой хлопок, запах горячей пыли"
  air_cold: "падение температуры, белое дыхание, иней, тихий воздух"
  resonance: "звук, вибрация, сбой голоса, пол/стена отвечает импульсом"
  magnetic_displacement: "металлический щелчок, дрожь застёжки, срыв траектории металла"
  impulse_shift: "ломаная траектория, неправильный шаг, предмет летит чуть не туда"
  light: "короткий световой импульс, след на сетчатке, перегрев при активном свечении"
  suppression_gravity: "тяжесть в теле/предмете, давление вниз, сбой шага"
  spatial_rare: "странная траектория, глохнущий звук, предмет не там, где ожидали"

rules:
  - "В любой сцене Академии помнить: вокруг носители энергии."
  - "Фоновые эффекты маленькие, физические, не декоративная магия."
  - "Не устраивать полный power showcase без причины."
  - "Сбои контроля должны иметь последствия: взгляд, запись, слух, замечание, рейтинг, очередь."
  - "Энергия не заменяет характер, конфликт и социальное давление."
  - "Если сцена стала слишком обычной, добавить один малый энергетический след."


academy_uniform_visuals:
  palette: >
    Базовая форма Академии Астрейн держится в тёмно-бордовой, чёрной/тёмной и золотой гамме.
    Узнаваемый элемент — бордовый пиджак или куртка с академическим знаком, тёмная рубашка
    и золотые детали: эмблема, пуговицы, кант, значки или застёжки.
  standard_girls: >
    Для девушек стандарт — бордовый пиджак, тёмная рубашка, галстук/лента/шейная деталь на выбор,
    юбка академического кроя и нормальная практичная обувь.
  variation_rule: >
    Не все студенты соответствуют идеалу формы. Кто-то носит белую рубашку вместо чёрной, делает юбку
    короче или длиннее, добавляет украшения, не заправляет рубашку, снимает галстук, закатывает рукава
    или меняет обувь. Это не официальный образец формы, но обычная живая вариативность Академии:
    каждый носит форму так, как позволяет характер, статус, привычки и готовность спорить с правилами.
  examples:
    - "Хару может закатывать рукава и выглядеть менее собранно, чем требует идеал формы."
    - "Статусные или яркие студенты могут добавлять украшения, ремни, значки или менять посадку формы."
    - "Более строгие студенты держат пиджак, рубашку и обувь почти по правилам."
  akira_specific: >
    Акира в форме Академии носит тёмно-бордовый пиджак с золотой эмблемой/деталями,
    чёрную рубашку, чёрную юбку-шорты вместо стандартной юбки, без галстука, и длинные массивные
    чёрные ботинки. Её очень длинные белые волосы распущены и заметны на фоне бордово-чёрной формы.
