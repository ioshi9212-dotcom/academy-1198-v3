name: classic-runtime-smoke

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m py_compile app/main.py

      - name: Check current tiny contract markers
        run: |
          grep -q "version=\"3.5.3\"" app/main.py
          grep -q "turn_contract_classic_v2" app/main.py
          grep -q "response_profile.*tiny_3_5_3" app/main.py
          grep -q "scene_contract_classic_bridge_v2_tiny" app/main.py
          grep -q "tiny_scene_contract_bridge" app/main.py
          grep -q "classic_output_format_contract" app/main.py
          grep -q "classic_forbidden_new_facts" app/main.py

      - name: Check turn-contract route is on get_turn_contract
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('app/main.py').read_text(encoding='utf-8')
          marker = '@app.post("/api/v1/sessions/{session_id}/turn-contract")\ndef get_turn_contract'
          assert marker in text, 'turn-contract decorator is not attached to get_turn_contract'
          bad = '@app.post("/api/v1/sessions/{session_id}/turn-contract")\n\ndef build_classic_required_files'
          assert bad not in text, 'turn-contract decorator is still attached to helper'
          PY

      - name: Check required files exist
        run: |
          test -f gpt/custom_gpt_instructions_CLASSIC_RESTORE.md
          test -f gpt/locks/no_empty_scenes_lock.md
          test -f gpt/locks/no_micro_choices_lock.md
          test -f gpt/locks/voice_fit_lock.md
          test -f gpt/locks/markdown_dialogue_format_lock.md
          test -f gpt/locks/energy_privacy_lock.md
          test -f story/calendar/academy_start.yaml
