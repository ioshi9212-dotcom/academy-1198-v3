arc_id: "arc_001_academy_start"
title: "Старт Академии"

starts_at:
  day_id: "academy_day_001"
  event_id: "event_academy_start"

ends_at:
  day_id: null
  event_id: null

core_purpose:
  - "ввести Акиру и Ливию в Академию 1198"
  - "показать правила Академии через действие"
  - "запустить первые связи"
  - "не превращать старт в бытовую регистрацию"

required_beats:
  - beat_id: "beat_001_akira_livia_entry"
    characters: ["char_akira", "char_livia"]
    summary: "Акира и Ливия стартуют вместе. Ливия имеет свой голос и не является фоном Акиры."

  - beat_id: "beat_002_entry_check"
    characters: ["char_akira", "char_livia"]
    summary: "Первичная сверка Академии показывает порядок, правила и ближайший маршрут."

  - beat_id: "beat_003_kir_late_entry"
    characters: ["char_kir"]
    summary: "Кир появляется позже, будто опоздал на регистрацию или пришёл из другого потока новичков."

  - beat_id: "beat_004_kiara_first_trace"
    characters: ["char_kiara"]
    summary: "Киара получает первый след 1198-08-15 как заметная курсантка и будущая социальная соперница Ливии."

bridge_rules:
  - "каждый переход должен двигать сюжет, отношения, знания, конфликт, репутацию или расписание"
  - "пустые бытовые сцены не использовать"
  - "не тянуть всех персонажей сразу"
  - "активных персонажей брать по ID"

forbidden:
  - "не использовать старые стартовые линии как основу Академии"
  - "не начинать вне академической рамки"
  - "не раскрывать hidden lore через автора"
  - "не превращать Академию в бытовую песочницу"
