        scene_goal: "Показать связки, вызовы, репутацию и живую социальную механику Академии."
        pressure: "Спорт становится способом смотреть, выбирать сторону и проверять характер."
        summary: "Баскетбол показывает связки, репутацию, вызовы и то, что спорт в Академии не просто игра."
        optional_characters: ["char_akira", "char_livia", "char_kir", "char_haru", "char_raiden", "char_kiara"]
    forbidden: []

  academy_day_004:
