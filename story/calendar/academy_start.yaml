calendar_id: "academy_start"
year: "1198"
source: "academy_1198_runtime_calendar"
start_date: "1198-08-15"

calendar_rules:
  - "Календарь задаёт рамку дня, доступных персонажей и запреты, но не пишет сцену вместо ИИ."
  - "ИИ сам делает интересные сцены через действия NPC, социальные крючки, слухи, рейтинг, отношения и последствия."
  - "Если между важными датами пусто и игрок не просит пропуск, можно создать малое событие из текущего места, персонажей и открытых нитей."
  - "Не превращать календарь в пошаговую инструкцию."
  - "Не повторять beat после сохранённого прогресса."

days:
  academy_day_001:
    date: "1198-08-15"
    day_status: "hard_event"
    title: "Поступление в Академию"
    day_brief: "Поступление, регистрация, первое распределение, заселение и социальные крючки."

    director_task: >
      Играть Академию как живое поле носителей энергии: поток новичков, сотрудники,
      браслеты, экраны, чужие взгляды, мелкие сбои контроля у других студентов,
      первые слухи, рейтинг и выбор позиции Акиры. Не делать сухую экскурсию.

    active_start: ["char_akira", "char_livia"]
    near_start: ["char_livia"]

    possible_active_today:
      - character_id: "char_kir"
        use: "может войти после первого давления регистрации"
      - character_id: "char_kiara"
        use: "может дать первый социальный след после появления поля Академии"
      - character_id: "char_haru"
        use: "может появиться позже через шумную компанию, площадку, столовую или заметных курсантов"
      - character_id: "char_raiden"
        use: "может быть замечен позже рядом с Хару, не как первый центр сцены"

    must_do:
      - "Показать поступление и регистрацию через живые действия, а не справку."
      - "Показать Ливию рядом: она активная подруга, не гид и не фон."
      - "Показать Академию носителей энергии через малые фоновые проявления у других студентов."
      - "Открыть хотя бы один крючок: слух, рейтинг, внимание сотрудника, конфликт, отношение, Кир/Киара trace или бытовое правило."
      - "Доводить сцену до реального выбора: ответить, промолчать, спровоцировать, задержаться, пойти по маршруту, вмешаться, защитить или одёрнуть Ливию."

    allowed_background_energy:
      - "кто-то греет стакан пальцами"
      - "у раздражённого новичка белеет дыхание"
      - "браслет у кого-то мигает от малого скачка"
      - "сотрудник коротко пресекает демонстрацию"
      - "пахнет озоном, холодным металлом, горячей пылью или палёной тканью"

    akira_energy_on_15_august:
      status: "hidden_at_start"
      rule: "Не делать автоматическую проверку, уточнение или раскрытие энергии Акиры на обычной регистрации."
      allowed_only_if:
        - "игрок прямо выбирает энергетический отклик Акиры"
        - "сцена дошла до отдельной официальной проверки"
        - "state уже содержит активную проблему энергии Акиры"
        - "NPC имеет сохранённый источник знания и требует проверку"
      if_minimal_response: "Можно показать малый след, задержку, серую пометку или внимание сотрудника, но не называть полный тип и не делать публичное раскрытие."
      forbidden:
        - "система сразу уточнила пространственную энергию Акиры"
        - "energy clarification как главное первое событие дня"
        - "студенты знают тип энергии Акиры без источника"

    beats:
      - beat_id: "entry_and_registration"
        use: "вход, очередь, документы, браслеты, сотрудники, внимание к волосам, реакция Ливии"
      - beat_id: "first_social_hooks"
        use: "слухи, рейтинг, Kiara trace, Kir entry, реакция новичков или сотрудников"
      - beat_id: "settling_and_route"
        use: "маршрут, форма, первичный зал, общежитие или кофе; не стопориться на микрошаге"

    optional_later_same_day:
      - event_id: "uniform_and_dorm_assignment"
        use: "форма, размещение, комнаты, чужие взгляды, первые соседства"
      - event_id: "cafeteria_or_coffee"
        use: "не кнопка автомата, а место, люди, разговоры, кто рядом, что услышали"
      - event_id: "first_group_attention"
        use: "Киара, Хару, Райден или старшие курсанты могут стать заметными, но не все сразу"

    forbidden:
      - "автоматическая проверка энергии Акиры на обычной регистрации"
      - "публичное раскрытие полного типа энергии Акиры в первый входной beat"
      - "сцена-гид по Академии вместо живого действия"
      - "микровыборы: нажать кнопку, ждать инструкций, смотреть на панель, взять карточку"
      - "все возможные персонажи в одной сцене без причины"

  academy_day_017:
    date: "1198-08-31"
    day_status: "social_training_day"
    title: "Закрытая энергия и социальное поле"
    day_brief: "День Академии с бытовыми сценами, тренировочным фоном и социальными крючками без публичного афиширования энергии студентов."

    director_task: >
      Играть день через людей, расписание, малые конфликты, бытовые правила,
      слухи, отношения и последствия. Энергия присутствует фоном, но типы и детали
      студентов не объявляются публично без официального основания и источника.

    possible_active_today:
      - character_id: "char_livia"
        use: "рядом с Акирой, может тянуть социальную сцену или конфликт"
      - character_id: "char_kir"
        use: "может появиться через расписание, общую зону, проверку или спор"
      - character_id: "char_kiara"
        use: "может давить социальным статусом, вниманием вокруг себя или соперничеством с Ливией"
      - character_id: "char_haru"
        use: "может появиться через шумную группу, тренировку, площадку или столовую"
      - character_id: "char_raiden"
        use: "может быть холодной точкой сцены рядом с Хару или вне толпы"

    energy_privacy_rule:
      status: "closed_not_public"
      rule: "31 августа не афишировать типы энергии студентов, включая Акиру, без отдельного официального основания."
      allowed:
        - "малые фоновые проявления без точной классификации"
        - "последствия энергии: жар, холод, запах, датчик, дрожь металла, реакция сотрудника"
        - "личное действие игрока с энергией"
        - "официальная закрытая проверка, если она уже задана state или календарным beat"
      forbidden:
        - "публично объявлять тип энергии Акиры"
        - "публично объявлять типы энергии других студентов без источника"
        - "делать сцену-справочник по энергиям"
        - "использовать датчик как всезнающий источник"
        - "раскрывать hidden lore через narration, сотрудника или экран"

    scene_hooks:
      - "слух или неверное предположение о чужом типе энергии"
      - "малый сбой контроля у другого студента без публичной расшифровки"
      - "закрытая пометка сотрудника без объяснения толпе"
      - "социальная провокация вокруг статуса, рейтинга или внимания"
      - "выбор Акиры: вмешаться, проигнорировать, ответить, использовать Ливию как шум, уйти по маршруту"

    forbidden:
      - "публичная классификация энергии студентов"
      - "автоматическое раскрытие энергии Акиры"
      - "официальное объявление скрытой информации через экран"
      - "микровыборы вместо реального выбора"

