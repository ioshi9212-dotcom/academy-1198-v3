    day_status: "hard_event"
    title: "Последствия месяца"
    required_events:
      - event_id: "event_month_consequences"
        type: "consequence"
        required: true
        title: "Рейтинги, допуски, слухи и переходы"
        summary: "Рейтинговый пересчёт, изменение допусков, закрепление слухов и перенос открытых линий в следующий месяц."
        required_characters: ["char_akira"]
        optional_characters: ["char_livia", "char_kir", "char_haru", "char_raiden", "char_kiara", "char_samuel"]
